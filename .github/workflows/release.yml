name: Build Plugin Release ZIP

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag starting with 'v'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create ZIP Package
        run: |
          # Uses the tag name (like v1.3.0) to name the file dynamically
          zip -r cookiezu-${{ github.ref_name }}.zip cookiezu/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cookiezu-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}